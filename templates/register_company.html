{% extends "base.html" %}

{% block title %}Company Registration - CareerSync{% endblock %}

{% block sidebar %}{% endblock %}
{% block topbar %}{% endblock %}

{% block content %}
<style>
    .container {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 40px 20px !important;
        margin: 0 !important;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
    }

    .auth-container {
        width: 100%;
        max-width: 600px;
        margin: auto;
        padding: 48px 40px;
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-lg);
        position: relative;
        overflow: hidden;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 32px;
        position: relative;
        z-index: 1;
    }

    .auth-header h1 {
        font-size: 2rem;
        margin-bottom: 8px;
        color: var(--text-main);
        font-weight: 700;
        border: none;
    }

    .auth-header p {
        color: var(--text-muted);
        font-weight: 500;
        margin: 0;
    }

    .auth-form {
        position: relative;
        z-index: 1;
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
        margin: 0;
    }

    .auth-form input, .auth-form textarea {
        max-width: 100%;
    }

    .auth-form button[type="submit"] {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        font-size: 1rem;
    }

    .auth-footer {
        margin-top: 32px;
        text-align: center;
        font-size: 0.95rem;
        position: relative;
        z-index: 1;
    }

    .auth-footer a {
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .auth-footer a:hover {
        color: var(--primary-hover);
    }
</style>

<div class="auth-container">
    <div class="auth-header">
        <h1>Company Registration</h1>
        <p>Join CareerSync to hire top talent</p>
    </div>

    <form method="POST" class="auth-form">
        <label>Company Name</label>
        <input type="text" name="company_name" placeholder="E.g. TechNova Solutions" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="company@example.com" required>

        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" name="password" placeholder="Create a strong password" required>
            <button type="button" class="password-toggle" title="Toggle Password Visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <label>HR Contact</label>
        <input type="number" name="hr_contact" placeholder="Phone number" required>

        <label>Website</label>
        <input type="text" name="website" placeholder="https://example.com" required>

        <label>Domain</label>
        <input type="text" name="domain" placeholder="E.g. Software, Finance, Healthcare" required>

        <label>Description</label>
        <textarea name="description" placeholder="Tell us about your company..." required></textarea>

        <label>Type of Employment</label>
        <input type="text" name="type_of_employment" placeholder="Full-time, Internship, etc.">

        <button type="submit">Create Company Account</button>
    </form>

    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
