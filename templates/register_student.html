{% extends "base.html" %}

{% block title %}Student Registration - CareerSync{% endblock %}

{% block content %}
<style>
    .auth-container {
        max-width: 600px;
        margin: 60px auto;
        padding: 40px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        position: relative;
        overflow: hidden;
    }

    .auth-container::before {
        content: '';
        position: absolute;
        top: -50px;
        left: -50px;
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 30px;
        position: relative;
        z-index: 1;
    }

    .auth-header h1 {
        font-size: 2.5rem;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--primary), #EC4899);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        border: none;
    }

    .auth-header p {
        color: var(--text-muted);
        font-weight: 500;
        margin: 0;
    }

    .auth-form {
        position: relative;
        z-index: 1;
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
        margin: 0;
    }

    .auth-form input {
        max-width: 100%;
        background: rgba(255, 255, 255, 0.6);
        padding: 14px 16px;
    }

    .auth-form input[type="file"] {
        padding: 10px;
    }

    .auth-form button[type="submit"] {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        font-size: 1.1rem;
    }

    .auth-footer {
        margin-top: 30px;
        text-align: center;
        font-size: 0.95rem;
        position: relative;
        z-index: 1;
    }

    .auth-footer a {
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), #EC4899);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
    }
</style>

<div class="auth-container">
    <div class="auth-header">
        <h1>Student Registration</h1>
        <p>Create your CareerSync profile to apply for drives</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="auth-form">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="Riya Mittal" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="student@example.com" required>

        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" name="password" placeholder="Create a strong password" required>
            <button type="button" class="password-toggle" title="Toggle Password Visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <label>Phone Number</label>
        <input type="number" name="phone_number" placeholder="Phone number" required>

        <label>Degree</label>
        <input type="text" name="degree" placeholder="E.g. B.Tech, MCA" required>

        <label>Branch</label>
        <input type="text" name="branch" placeholder="E.g. Computer Science" required>

        <label>CGPA</label>
        <input type="number" step="0.01" name="cgpa" placeholder="E.g. 8.5" required>

        <label>Skills</label>
        <input type="text" name="skills" placeholder="Python, React, Machine Learning..." required>

        <label>Resume (PDF only)</label>
        <input type="file" name="resume" accept=".pdf" required>

        <label>Internship Experience</label>
        <input type="text" name="internship_experience" placeholder="Any past internships? (Or type 'None')" required>

        <label>Co Curricular Achievements</label>
        <input type="text" name="co_curricular_achievements" placeholder="Hackathons, sports, etc." required>

        <button type="submit">Create Student Account</button>
    </form>

    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
