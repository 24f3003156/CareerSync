{% extends "base.html" %}

{% block title %}Student Registration - CareerSync{% endblock %}

{% block content %}
<h1>Student Registration</h1>

<div class="nav-links">
    <a href="{{ url_for('index') }}">Home</a>
    <a href="{{ url_for('login') }}">Login</a>
</div>

<form method="POST" enctype="multipart/form-data">
    <label>Full Name</label>
    <input type="text" name="full_name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <label>Phone Number</label>
    <input type="number" name="phone_number" required>

    <label>Degree</label>
    <input type="text" name="degree" required>

    <label>Branch</label>
    <input type="text" name="branch" required>

    <label>CGPA</label>
    <input type="number" step="0.01" name="cgpa" required>

    <label>Skills</label>
    <input type="text" name="skills" required>

    <label>Resume (PDF only)</label>
    <input type="file" name="resume" accept=".pdf" required>

    <label>Internship Experience</label>
    <input type="text" name="internship_experience" required>

    <label>Co Curricular Achievements</label>
    <input type="text" name="co_curricular_achievements" required>

    <button type="submit">Register</button>
</form>
{% endblock %}
