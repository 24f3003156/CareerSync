<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
</head>
<body>
    <h1>Student Registration</h1>

    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="full_name" required>

        <br><br>

        <label>Email</label>
        <input type="email" name="email" required>

        <br><br>

        <label>Password</label>
        <input type="password" name="password" required>

        <br><br>

        <label>Phone Number</label>
        <input type="number" name="phone_number" required>

        <br><br>

        <label>Degree</label>
        <input type="text" name="degree" required>

        <br><br>

        <label>Branch</label>
        <input type="text" name="branch" required>

        <br><br>

        <label>CGPA</label>
        <input type="number" step="0.01" name="cgpa" required>

        <br><br>

        <label>Skills</label>
        <input type="text" name="skills" required>

        <br><br>

        <label>Resume Filename</label>
        <input type="text" name="resume_filename" required>

        <br><br>

        <label>Internship Experience</label>
        <input type="text" name="internship_experience" required>

        <br><br>

        <label>Co Curricular Achievements</label>
        <input type="text" name="co_curricular_achievements" required>

        <br><br>

        <button type="submit">Register</button>
    </form>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

</body>
</html>
