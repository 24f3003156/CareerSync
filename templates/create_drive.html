{% extends "base.html" %}

{% block title %}Create Placement Drive - CareerSync{% endblock %}

{% block content %}
<h1>Create Placement Drive</h1>

<div class="nav-links">
    <a href="{{ url_for('company_dashboard') }}">Back to Company Dashboard</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</div>

<form method="POST">
    <label>Job Title</label>
    <input type="text" name="job_title" required>

    <label>Job Description</label>
    <textarea name="job_description" required></textarea>

    <label>Minimum CGPA</label>
    <select name="eligibility_criteria" required>
        <option value="">Select Minimum CGPA</option>
        <option value="6.0">6.0</option>
        <option value="6.5">6.5</option>
        <option value="7.0">7.0</option>
        <option value="7.5">7.5</option>
        <option value="8.0">8.0</option>
        <option value="8.5">8.5</option>
        <option value="9.0">9.0</option>
    </select>

    <label>Skills Required</label>
    <input type="text" name="skills_required" required>

    <label>Package Range</label>
    <input type="number" name="package_range" min="0" step="0.01">

    <label>Location</label>
    <input type="text" name="location" required>

    <label>Application Deadline</label>
    <input type="datetime-local" name="application_deadline" required min="{{ now }}">

    <button type="submit">Create Drive</button>
</form>
{% endblock %}
