{% extends "base.html" %}

{% block title %}Edit Placement Drive - CareerSync{% endblock %}

{% block content %}
<h1>Edit Placement Drive</h1>

<div class="nav-links">
    <a href="{{ url_for('company_drives') }}">Back to My Drives</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</div>

<form method="POST">
    <label>Job Title</label>
    <input type="text" name="job_title" value="{{ drive.job_title }}" required>

    <label>Job Description</label>
    <textarea name="job_description" required>{{ drive.job_description }}</textarea>

<style>
    .cgpa-selector {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
        gap: 8px;
        margin-bottom: 20px;
        margin-top: 4px;
    }
    .cgpa-card {
        cursor: pointer;
        display: block;
    }
    .cgpa-card input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
    }
    .cgpa-content {
        background: #f8fafc;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 10px 4px;
        text-align: center;
        transition: all 0.2s ease;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-muted);
    }
    .cgpa-card:hover .cgpa-content {
        background: #f1f5f9;
        border-color: #cbd5e1;
        transform: translateY(-1px);
    }
    .cgpa-card input[type="radio"]:checked + .cgpa-content {
        background: var(--primary-light);
        border-color: var(--primary);
        color: var(--primary);
    }
</style>

    <label>Minimum CGPA</label>
    <div class="cgpa-selector">
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="6.0" {% if drive.eligibility_criteria == "6.0" %}checked{% endif %} required>
            <div class="cgpa-content">6.0</div>
        </label>
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="6.5" {% if drive.eligibility_criteria == "6.5" %}checked{% endif %}>
            <div class="cgpa-content">6.5</div>
        </label>
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="7.0" {% if drive.eligibility_criteria == "7.0" %}checked{% endif %}>
            <div class="cgpa-content">7.0</div>
        </label>
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="7.5" {% if drive.eligibility_criteria == "7.5" %}checked{% endif %}>
            <div class="cgpa-content">7.5</div>
        </label>
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="8.0" {% if drive.eligibility_criteria == "8.0" %}checked{% endif %}>
            <div class="cgpa-content">8.0</div>
        </label>
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="8.5" {% if drive.eligibility_criteria == "8.5" %}checked{% endif %}>
            <div class="cgpa-content">8.5</div>
        </label>
        <label class="cgpa-card">
            <input type="radio" name="eligibility_criteria" value="9.0" {% if drive.eligibility_criteria == "9.0" %}checked{% endif %}>
            <div class="cgpa-content">9.0</div>
        </label>
    </div>

    <label>Skills Required</label>
    <input type="text" name="skills_required" value="{{ drive.skills_required }}" required>

    <label>Package Range</label>
    <input type="number" name="package_range" min="0" step="0.01" value="{{ drive.package_range }}">

    <label>Location</label>
    <input type="text" name="location" value="{{ drive.location }}" required>

    <label>Application Deadline</label>
    <input type="datetime-local" name="application_deadline" required min="{{ now }}">

    <button type="submit">Update Drive</button>
</form>
{% endblock %}
