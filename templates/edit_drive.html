<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Placement Drive</title>
</head>
<body>
    <h1>Edit Placement Drive</h1>

    <p><a href="{{ url_for('company_drives') }}">Back to My Drive</a></p>
    <p><a href="{{ url_for('logout') }}">Logout</a></p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Job Title</label>
        <input type="text" name="job_title" value="{{ drive.job_description }}" required>
        <br><br>

        <label>Job Description</label>
        <textarea name="job_description" required>{{ drive.job_description }}</textarea>
        <br><br>

        <label>Eligibilty Criteria</label>
        <input type="text" name="eligibility_criteria" value="{{ drive.eligibility_criteria }}" required>

        <label>Skills Required</label>
        <input type="text" name="skills_required" value="{{ drive.skills_required }}" required>
        <br><br>

        <label>Package Range</label>
        <input type="text" name="package_range" value="{{ drive.package_range }}">
        <br><br>

        <label>Location</label>
        <input type="text" name="location"  value="{{ drive.location }}" required>
        <br><br>

        <label>Application Deadline</label>
        <input type="datetime-local" name="application_deadline" required>
        <br><br>

        <button type="submit">Update Drive</button>
    </form>
</body>
</html>
